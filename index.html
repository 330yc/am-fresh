<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生鮮異常庫存週報</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#23282b; --line:#00606E; --line2:#0A8090; --muted:#8a949a; --grid:#e3e7e9;
    --bg:#F4F2EC; --panel:#ffffff; --soft:#fbfaf6;
    --font:"Noto Sans TC","Noto Sans CJK TC","Microsoft JhengHei","PingFang TC","Heiti TC",sans-serif;
    --latin:"Noto Sans TC","Noto Sans CJK TC",sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); font-family:var(--font); color:var(--ink); -webkit-font-smoothing:antialiased;}

  .controls{
    position:sticky; top:0; z-index:50; background:rgba(255,255,255,.92); backdrop-filter:blur(8px);
    border-bottom:1px solid #e6e2d8; padding:12px 22px; display:flex; flex-wrap:wrap; gap:12px; align-items:center;
    box-shadow:0 2px 14px rgba(0,40,50,.05);
  }
  .brand{display:flex; flex-direction:column; line-height:1.15; margin-right:6px;}
  .brand b{font-size:15px; font-weight:800; color:var(--line); letter-spacing:.5px;}
  .brand span{font-size:10.5px; color:var(--muted); letter-spacing:1.5px; font-family:var(--latin); font-weight:600;}
  .tabs{display:flex; gap:4px; background:#ece8de; padding:4px; border-radius:11px;}
  .tab{border:none; background:transparent; padding:8px 16px; border-radius:8px; font-family:var(--font);
    font-size:13px; font-weight:700; color:#6b7479; cursor:pointer; transition:.18s;}
  .tab:hover{color:var(--line);}
  .tab.active{background:var(--line); color:#fff; box-shadow:0 2px 8px rgba(0,96,110,.28);}
  .spacer{flex:1;}
  .btn{border:none; border-radius:9px; padding:9px 15px; font-family:var(--font); font-size:12.5px;
    font-weight:700; cursor:pointer; transition:.15s; color:#fff; background:var(--line);}
  .btn:hover{filter:brightness(1.08); transform:translateY(-1px);}
  .btn.ghost{background:#fff; color:var(--line); border:1.5px solid #cfe0e2;}
  .btn.ghost:hover{background:#f0f8f9;}
  .btn.sec{background:#5a676c;}
  input[type=date]{border:1.5px solid #d8d2c4; border-radius:9px; padding:7px 10px; font-family:var(--font); font-size:12.5px; background:#fff;}
  .filechip{font-size:11.5px; color:var(--muted); max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .status{font-size:11.5px; color:var(--line2); font-weight:700;}

  .iconbtn{width:40px; height:40px; padding:0; display:inline-flex; align-items:center; justify-content:center; font-size:17px; line-height:1;}
  .menuwrap{position:relative;}
  .menu{position:absolute; top:48px; right:0; width:312px; background:#fff; border:1px solid #e2ded1; border-radius:16px;
    box-shadow:0 16px 48px rgba(0,40,50,.18); padding:8px; display:none; z-index:70;}
  .menu.open{display:block;}
  .menu .mlabel{color:var(--muted); font-size:10.5px; font-weight:800; letter-spacing:.8px; padding:9px 11px 3px;}
  .menu .mrow{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:6px 11px;}
  .menu .msep{height:1px; background:#efece3; margin:5px 6px;}
  .menu .minfo{font-size:11px; color:var(--muted); padding:0 11px 8px; word-break:break-all; line-height:1.4;}
  .menu .sm{padding:7px 12px; font-size:12px;}
  .menu .mbtn{display:block; width:calc(100% - 12px); margin:2px 6px; text-align:center;}
  .menu input[type=date]{padding:6px 9px; font-size:12px;}
  .menu .acct{font-size:12px; color:var(--ink); font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:170px;}

  .panel{background:#fff; border-bottom:1px solid #e6e2d8; padding:0 22px; max-height:0; overflow:hidden; transition:max-height .25s, padding .25s;}
  .panel.open{max-height:430px; padding:16px 22px; overflow:auto;}
  .panel h2{font-size:12.5px; margin-bottom:10px; color:var(--line);}
  .htable{width:100%; border-collapse:collapse; font-size:11.5px;}
  .htable th,.htable td{border-bottom:1px solid #eee; padding:5px 8px; text-align:right; font-variant-numeric:tabular-nums;}
  .htable th:first-child,.htable td:first-child{text-align:left;}
  .htable th{color:var(--muted); font-weight:600;}
  .htable .del{color:#BB3E03; cursor:pointer; font-weight:800; text-align:center;}
  .panel .acts{margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;}

  .stage{padding:26px 0 70px; display:flex; flex-direction:column; align-items:center; gap:24px;}
  .holder{position:relative;}
  .slide{position:relative; width:13.333in; height:7.5in; background:#fff; transform-origin:top left;
    border-radius:10px; box-shadow:0 10px 34px rgba(0,40,50,.13); overflow:hidden;}
  .slide .ttl{position:absolute; left:.6in; top:.3in; font-size:28pt; font-weight:900; letter-spacing:.5px;}
  .slide .rule{position:absolute; left:.6in; top:1.16in; width:12.13in; height:2.5pt;
    background:linear-gradient(90deg,var(--line),var(--line2));}
  .slide .unit{position:absolute; font-size:11.5pt; color:#5a676c;}
  .slide .foot{position:absolute; left:.6in; top:7.06in; font-size:8.5pt; color:#b7bcc0; letter-spacing:.3px;}
  .slide .pg{position:absolute; right:.5in; top:6.95in; font-size:16pt; font-weight:800; color:var(--line); font-family:var(--latin);}

  .fbox{position:absolute; font-size:12.5pt; line-height:1.5; color:#2c3236;}
  .fbox b{font-weight:800; color:var(--line);}
  .fbox .note{color:var(--muted); font-size:11pt;}

  .legend{position:absolute; display:flex; flex-wrap:wrap; gap:6px 16px; font-size:10.5pt;}
  .legend .it{display:flex; align-items:center; gap:5px;}
  .legend .sw{width:13px; height:13px; border-radius:3px; display:inline-block;}

  .chart{position:absolute; display:grid; align-items:end;}
  .chart .barwrap{position:relative; height:100%; display:flex; flex-direction:column; justify-content:flex-end;}
  .chart .bar{position:relative; margin:0 auto; width:64%; display:flex; flex-direction:column-reverse; height:100%; border-radius:3px 3px 0 0; overflow:hidden;}
  .chart .seg{display:flex; align-items:center; justify-content:center; font-size:10pt; font-weight:700; overflow:hidden; line-height:1;}
  .xrow{position:absolute; display:grid; font-size:11.5pt; font-weight:700; text-align:center; color:#3a4145;}
  .trow{position:absolute; display:grid; font-size:11.5pt; font-weight:800; text-align:center; align-items:center;}
  .trow .lbl{text-align:left;}
  .trow .cell{font-variant-numeric:tabular-nums; color:var(--line);}

  .cover{background:var(--soft);}
  .cover .band{position:absolute; left:0; top:0; width:.32in; height:7.5in; background:linear-gradient(180deg,var(--line),var(--line2));}
  .cover .kicker{position:absolute; left:1.1in; top:2.5in; font-size:12pt; letter-spacing:4px; color:var(--line2); font-weight:700; font-family:var(--latin);}
  .cover .ct{position:absolute; left:1.05in; top:2.95in; font-size:44pt; font-weight:900; color:var(--ink); letter-spacing:1px;}
  .cover .cd{position:absolute; left:1.1in; top:4.15in; font-size:20pt; color:var(--muted);}
  .cover .ag{position:absolute; left:1.1in; top:5.4in; font-size:15pt; line-height:1.8; color:#3a4145;}
  .cover .ag .dot{color:var(--line2); font-weight:800;}

  .ttbl{position:absolute; border-collapse:collapse; font-size:10.5pt; font-variant-numeric:tabular-nums;}
  .ttbl th,.ttbl td{border:1px solid #d8dcde; padding:5px 7px; height:.4in;}
  .ttbl th{background:var(--line); color:#fff; font-weight:700; text-align:center; font-size:11pt; border-color:var(--line);}
  .ttbl tr:nth-child(even) td{background:#f7f9f9;}
  .c-store,.c-st,.c-rt,.c-rank{text-align:center;}
  .c-name{text-align:left;}
  .c-amt{text-align:right; font-weight:600;}

  .mtbl{position:absolute; border-collapse:collapse; font-size:9.5pt; font-variant-numeric:tabular-nums;}
  .mtbl th,.mtbl td{border:1px solid #d8dcde; padding:3px 5px; text-align:center; height:.34in;}
  .mtbl th{background:var(--line); color:#fff; font-weight:700;}
  .mtbl td.cat{text-align:left; font-weight:700;}
  .mtbl td.cat .sw{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:4px;vertical-align:middle;}
  .mtbl tr.sum td{background:#eef3f3; font-weight:800;}
  .mtbl td.tot{font-weight:800; color:var(--line);}

  .placeholder{position:absolute; left:50%; top:55%; transform:translate(-50%,-50%); text-align:center; color:var(--muted);}
  .placeholder .big{font-size:18pt; font-weight:700; color:#9aa3a8;}
  .placeholder .sm{font-size:12pt; margin-top:6px;}

  @media print{
    @page{ size:13.333in 7.5in; margin:0; }
    html,body{background:#fff;}
    .controls,.panel{display:none !important;}
    .stage{padding:0; gap:0;}
    .holder{height:auto !important; width:auto !important;}
    .slide{transform:none !important; box-shadow:none; border-radius:0; page-break-after:always; break-after:page;}
    .slide:last-child{page-break-after:auto;}
  }
</style>
</head>

<div class="controls">
  <div class="brand"><b>生鮮異常庫存週報</b></div>

      <button class="btn ghost sm mbtn" id="histBtn">歷史資料</button>

      <div class="mlabel">目前載入</div>

</div>

<div class="panel" id="panel">
  <h2 id="panelTitle"></h2>
  <table class="htable" id="histTable"></table>

    <button class="btn ghost" id="expBtn">匯出 JSON</button>

    <button class="btn ghost" id="cloudBtn" style="border-color:#a8cdd2;">推送歷史到雲端</button>
    <button class="btn ghost" id="clrBtn" style="color:#BB3E03;border-color:#e0b8a8;">清空此報告歷史</button>
  </div>
</div>

<div class="stage" id="stage"></div>

/* 日期工具：YYYYMMDD int */
function old(dateInt, cutInt){ return (!dateInt) || dateInt < cutInt; }     // 距今 > 門檻（含 0/空）
function recent(dateInt, cutInt){ return dateInt && dateInt >= cutInt; }    // 距今 < 門檻
function hasBarcode(bc){ const s=String(bc||"").trim(); return s.length>0 && s!=="0" && !s.startsWith("200"); } // 排除店內碼(200開頭)
function ymd(d){ return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate(); }
function minusDays(reportInt, days){
  const y=Math.floor(reportInt/10000), m=Math.floor(reportInt/100)%100, dd=reportInt%100;
  const d=new Date(y,m-1,dd); d.setDate(d.getDate()-days); return ymd(d);
}

function sortH(h){ return h.slice().sort((a,b)=> new Date(a.date.replace(/\//g,'-')) - new Date(b.date.replace(/\//g,'-'))); }
function upsert(report,date,byCat){
  const all=loadAll(); let h=(all[report]||[]).filter(r=>r.date!==date);
  const row={date}; SECS.forEach(s=>row[s]=byCat[s]||0); h.push(row);
  all[report]=sortH(h); saveAll(all); return all[report];
}

async function loadFromCloud(){
  if(!USER||!DB) return;
  try{
    setStatus("讀取雲端…");

    const all=loadAll();
    for(const r of ORDER){

      if(Array.isArray(d.weeks)){
        const byDate={}; (all[r]||[]).forEach(x=>byDate[x.date]=x);     // 以日期合併，雲端優先
        d.weeks.forEach(x=>{ const dt=ndClient(x.date); const row={date:dt}; SECS.forEach(s=>row[s]=Number(x[s])||0); byDate[dt]=row; });
        all[r]=sortH(Object.values(byDate));
      }

    }
    saveAll(all); saveCurrentLocal(); render(); if(document.getElementById("panel").classList.contains("open")) renderHist();

  }catch(e){ setStatus("雲端讀取失敗，用本機資料"); render(); }

/* ====== 解析 + 三報告同時彙整 ====== */
function norm(s){return String(s==null?"":s).replace(/\s+/g,"").trim();}
function blank(report){
  const sc={},cnt={},tot={}; STORE_ORDER.forEach(st=>{sc[st]={};cnt[st]={};tot[st]=0;SECS.forEach(s=>{sc[st][s]=0;cnt[st][s]=0;});});
  return {byCat:Object.fromEntries(SECS.map(s=>[s,0])), storeCat:sc, storeCount:cnt, storeTot:tot, rows:[]};
}
function processMaster(rows, dateStr){
  const head=rows[0].map(norm);
  const I=k=>head.indexOf(k);
  const ix={店:I("店號"),sec:I("SEC"),cat:I("CAT"),nm:I("品名"),st:I("商品狀態"),rt:I("可否退貨"),
    dms:I("DMS"),qty:I("庫存數"),amt:I("庫存金額"),bc:I("國際條碼"),sup:I("供應商編號"),
    s:I("最後一次銷售日"),p:I("最後一次進貨驗收日"),mi:I("最後一次移入日期"),mo:I("最後一次移出日期")};
  const reportInt=(()=>{const p=dateStr.split("/");return (+p[0])*10000+(+p[1])*100+(+p[2]);})();
  const ctx={wk8:minusDays(reportInt,56), d180:minusDays(reportInt,180)};
  const acc={}; ORDER.forEach(k=>acc[k]=blank(k));
  for(let i=1;i<rows.length;i++){
    const row=rows[i]; if(!row||row.length===0) continue;
    const store=parseInt(row[ix.店],10); if(isNaN(store)) continue;
    if(CG_SET.size){ const sup=parseInt(row[ix.sup],10); if(CG_SET.has(sup)) continue; }   // 排除 CG 廠商
    const rec={store, sec:parseInt(String(row[ix.sec]),10), cat:parseInt(String(row[ix.cat]),10),
      nm:String(row[ix.nm]||"").trim(), st:String(row[ix.st]||"").trim(), rt:String(row[ix.rt]||"").trim(),
      dms:parseFloat(row[ix.dms])||0, qty:parseFloat(row[ix.qty])||0, amt:parseFloat(row[ix.amt])||0, bc:row[ix.bc],
      s:parseInt(row[ix.s],10)||0, p:parseInt(row[ix.p],10)||0, mi:parseInt(row[ix.mi],10)||0, mo:parseInt(row[ix.mo],10)||0};
    for(const key of ORDER){
      if(!REPORTS[key].filter(rec,ctx)) continue;
      const a=acc[key];
      if(SECS.includes(rec.sec)){
        a.byCat[rec.sec]+=rec.amt;
        if(a.storeCat[store]){ a.storeCat[store][rec.sec]+=rec.amt; a.storeCount[store][rec.sec]+=1; }
      }
      if(a.storeTot[store]!=null) a.storeTot[store]+=rec.amt;
      a.rows.push(rec);
    }
  }
  const out={};
  for(const key of ORDER){
    const a=acc[key]; const k=v=>Math.round(v/1000);
    const byCatK=Object.fromEntries(SECS.map(s=>[s,k(a.byCat[s])]));
    const storeCatK={}; STORE_ORDER.forEach(st=>{storeCatK[st]=Object.fromEntries(SECS.map(s=>[s,k(a.storeCat[st][s])]));});
    const storeTot=Object.fromEntries(STORE_ORDER.map(st=>[st,k(a.storeTot[st])]));
    const top=a.rows.slice().sort((x,y)=>y.amt-x.amt);
    out[key]={date:dateStr, n:a.rows.length, byCatK, storeCatK, storeCount:a.storeCount, storeTot,
      top40:top.slice(0,40).map(d=>({店:d.store,品名:d.nm,狀態:d.st,退貨:d.rt,金額:Math.round(d.amt)})),
      top20:top.slice(0,20).map((d,i)=>({rank:i+1,品名:d.nm,金額:Math.round(d.amt)}))};
    upsert(key,dateStr,byCatK);
  }
  return out;
}

function stackedChart(slide,{cats,data,x,y,w,h,totals}){
  const n=cats.length, cols=`66px repeat(${n},1fr)`;
  let maxTot=1; for(let i=0;i<n;i++){let t=0;SECS.forEach(s=>t+=(data[s]?data[s][i]:0));if(t>maxTot)maxTot=t;}
  const chart=abs(el("div","chart"),{left:x,top:parseFloat(y)+"in",width:w,height:h+"in",gridTemplateColumns:cols});
  chart.appendChild(el("div"));
  for(let i=0;i<n;i++){
    const total=SECS.reduce((a,s)=>a+(data[s]?data[s][i]:0),0);
    const cell=el("div","barwrap"); const bar=el("div","bar"); bar.style.height=(total/maxTot*100)+"%";
    CANON.forEach(([sec])=>{ const v=data[sec]?data[sec][i]:0; if(v<=0)return;
      const seg=el("div","seg"); seg.style.background=COLOR[sec]; seg.style.height=(v/total*100)+"%";
      seg.style.color=WHITE[sec]?"#fff":"#2c3236"; if(v/maxTot*h*72>12) seg.textContent=v; bar.appendChild(seg);});
    cell.appendChild(bar); chart.appendChild(cell);
  }
  slide.appendChild(chart);
  const xr=abs(el("div","xrow"),{left:x,top:(parseFloat(y)+h+0.06)+"in",width:w,gridTemplateColumns:cols});
  xr.appendChild(el("div")); cats.forEach(c=>xr.appendChild(el("div",null,c))); slide.appendChild(xr);
  const tr=abs(el("div","trow"),{left:x,top:(parseFloat(y)+h+0.42)+"in",width:w,gridTemplateColumns:cols});
  tr.style.fontSize = n>15 ? "9pt" : "11pt";
  tr.appendChild(el("div","lbl","總金額")); totals.forEach(v=>tr.appendChild(el("div","cell",v.toLocaleString()))); slide.appendChild(tr);
}

function fitSlides(){
  const avail=Math.min(document.body.clientWidth-40, 13.333*96), scale=avail/(13.333*96);
  document.querySelectorAll(".holder").forEach(h=>{const sl=h.querySelector(".slide");
    sl.style.transform="scale("+scale+")"; h.style.width=(13.333*96*scale)+"px"; h.style.height=(7.5*96*scale)+"px";});
}
window.addEventListener("resize",fitSlides);

/* ====== Tabs ====== */
function buildTabs(){
  const tb=document.getElementById("tabs"); tb.innerHTML="";
  ORDER.forEach(k=>{ const b=el("button","tab"+(k===ACTIVE?" active":""),REPORTS[k].label);
    b.onclick=()=>{ACTIVE=k; buildTabs(); render(); if(document.getElementById("panel").classList.contains("open"))renderHist();}; tb.appendChild(b);});
}

/* ====== 歷史面板 ====== */
function renderHist(){
  const all=loadAll(); const h=sortH(all[ACTIVE]||[]);
  document.getElementById("panelTitle").textContent="【"+REPORTS[ACTIVE].label+"】歷史資料（單位：千元）— 每次上傳自動累積；可刪除或匯出備份";
  let html="<tr><th>週次</th>"+CANON.map(c=>"<th>"+String(c[0]).padStart(3,"0")+" "+c[1]+"</th>").join("")+"<th>合計</th><th>刪</th></tr>";
  h.forEach(r=>{ const tot=SECS.reduce((a,s)=>a+(r[s]||0),0);
    html+="<tr><td>"+r.date+"</td>"+SECS.map(s=>"<td>"+(r[s]||0)+"</td>").join("")+"<td><b>"+tot+"</b></td><td class='del' data-d='"+r.date+"'>✕</td></tr>";});
  const t=document.getElementById("histTable"); t.innerHTML=html;
  t.querySelectorAll(".del").forEach(d=>d.onclick=()=>{ if(confirm("刪除 "+REPORTS[ACTIVE].label+" 的 "+d.dataset.d+"？")){
    const all=loadAll(); all[ACTIVE]=(all[ACTIVE]||[]).filter(r=>r.date!==d.dataset.d); saveAll(all); renderHist(); render();}});
}

/* ====== 事件 ====== */
document.getElementById("file").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return;
  document.getElementById("filechip").textContent=f.name;
  const fm=f.name.match(/(20\d{2})(\d{2})(\d{2})/);          // 由檔名自動帶出報表日期
  if(fm){ document.getElementById("date").value=fm[1]+"-"+fm[2]+"-"+fm[3]; }
  document.getElementById("status").textContent="解析中…";
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      const di=document.getElementById("date").value;
      let date; if(di){const p=di.split("-");date=(+p[0])+"/"+(+p[1])+"/"+(+p[2]);}
      else{const d=new Date();date=d.getFullYear()+"/"+(d.getMonth()+1)+"/"+d.getDate();}
      CURRENT=processMaster(rows,date);
      saveCurrentLocal();
      buildTabs(); render(); if(document.getElementById("panel").classList.contains("open"))renderHist();
      pushWeek();   // 已登入則把當週資料＋歷史寫回 Firestore（未登入則跳過）
    }catch(err){ document.getElementById("status").textContent="解析失敗"; alert("解析失敗："+err.message); }
  };
  reader.readAsArrayBuffer(f);
});
document.getElementById("cgFile").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      CG_SET=parseCG(rows);
      const d=new Date(); CG_UPDATED=d.getFullYear()+"/"+(d.getMonth()+1)+"/"+d.getDate();
      cgSaveLocal(); cgPushCloud(); updateCgChip();
      alert("已載入 CG 名單："+CG_SET.size+" 家廠商。\n請重新上傳當週原始檔，套用排除後重新計算。");
    }catch(err){ alert("CG 名單解析失敗："+err.message); }
  };
  reader.readAsArrayBuffer(f);
  e.target.value="";
});
document.getElementById("pdfBtn").onclick=()=>window.print();
document.getElementById("expBtn").onclick=()=>{const all=loadAll();const blob=new Blob([JSON.stringify(all[ACTIVE]||[],null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=ACTIVE+"_history.json";a.click();};
document.getElementById("impFile").addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=ev=>{try{const j=JSON.parse(ev.target.result);if(Array.isArray(j)){const all=loadAll();all[ACTIVE]=sortH(j);saveAll(all);renderHist();render();alert("已匯入 "+j.length+" 週至「"+REPORTS[ACTIVE].label+"」");}}catch(err){alert("格式錯誤");}};r.readAsText(f);});
document.getElementById("clrBtn").onclick=()=>{if(confirm("清空「"+REPORTS[ACTIVE].label+"」全部歷史？")){const all=loadAll();all[ACTIVE]=[];saveAll(all);renderHist();render();}};
document.getElementById("cloudBtn").onclick=()=>bootstrapToCloud();
document.getElementById("authBtn").onclick=()=>{ USER?signOut():signIn(); };
document.getElementById("histBtn").onclick=()=>{ document.getElementById("menu").classList.remove("open"); const p=document.getElementById("panel"); p.classList.toggle("open"); if(p.classList.contains("open")) renderHist(); };
document.getElementById("gearBtn").onclick=(e)=>{ e.stopPropagation(); document.getElementById("menu").classList.toggle("open"); };
document.addEventListener("click",(e)=>{ const w=document.querySelector(".menuwrap"); if(w && !w.contains(e.target)) document.getElementById("menu").classList.remove("open"); });

document.getElementById("date").value="2026-05-31";
loadCurrentLocal(); cgLoadLocal(); updateCgChip(); buildTabs(); render(); fbInit();
</script>
</body>
